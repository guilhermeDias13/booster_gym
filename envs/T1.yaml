basic:
  checkpoint: null # set to -1 to load last saved model
  headless: false
  max_iterations: 10000 # set the maximum number of learning iterations to train for
  sim_device: "cuda:0" # device for physics simulation
  rl_device: "cuda:0" # device for the RL algorithm
  seed: 42 # seed - set to -1 to choose random seed
  description: "Equilíbrio antes de velocidade: terminate_vel alto (só explosões), tracking vx fraco, comandos lentos"

env:
  num_envs: 4096
  num_observations: 47
  num_privileged_obs: 14
  num_actions: 12
  env_spacing: 1.  # not used with plane terrain

runner:
  horizon_length: 24
  mini_epochs: 12
  save_interval: 100
  use_wandb: false
  log_termination_reasons: true # TensorBoard/WandB: termination/* e truncation/frac_cmd_resample

viewer:
  pos: [3., -3., 2.]  # [m]
  lookat: [0., 0., 0.]  # [m]
  record_video: true  # only in play
  record_interval: 5.  # [s]
  record_env_idx: 0

algorithm:
  learning_rate: 3.e-5
  gamma: 0.995
  lam: 0.95
  bound_coef: 1.2 # um pouco mais de pressão para manter ações no intervalo
  entropy_coef: 0.0 # sem bónus de entropia → menos política “louca” no início
  symmetric_coef: 10.
  desired_kl: 0.006

sim:
  dt: 0.002
  substeps: 1
  up_axis: "z"
  gravity: [0.0, 0.0, -9.81]
  physics_engine: "physx" # "physx" or "flex"
  physx:
    num_threads: 4 # Number of worker threads per scene used by PhysX - for CPU PhysX only.
    solver_type: 1 # 0: pgs, 1: tgs
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 100.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608 # 8*1024*1024
    num_subscenes: 4 # Splits the simulation into N physics scenes and runs each one in a separate thread
    contact_collection: 1 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)

asset:
  file: "resources/T1/T1_locomotion.urdf"
  mujoco_file: "resources/T1/T1_locomotion.xml"
  name: "T1"
  base_name: "Trunk"
  foot_names: ["left_foot_link", "right_foot_link"]
  disable_gravity: false
  default_dof_drive_mode: 3 # see GymDofDriveModeFlags (0 is none, 1 is pos tgt, 2 is vel tgt, 3 effort)
  collapse_fixed_joints: true # bug: if collapse_fixed_joints = false, foot doesn't collide with ground
  fix_base_link: false # fix the base of the robot
  self_collisions: 0 # 1 to disable, 0 to enable...bitwise filter
  replace_cylinder_with_capsule: false # replace collision cylinders with capsules, leads to faster/more stable simulation
  flip_visual_attachments: false # Some .obj meshes must be flipped from y-up to z-up
  density: 0.001
  angular_damping: 0.
  linear_damping: 0.
  max_angular_velocity: 1000.
  max_linear_velocity: 1000.
  armature: 0.
  thickness: 0.01
  feet_edge_pos: [[ 0.1215,  0.05, -0.03],
                  [ 0.1215, -0.05, -0.03],
                  [-0.1015,  0.05, -0.03],
                  [-0.1015, -0.05, -0.03]] # x,y,z [m]

init_state:
  pos: [0.0, 0.0, 0.9] # x,y,z [m]
  rot: [0.0, 0.0, 0.0, 1.0] # x,y,z,w [quat]
  randomize_yaw: false # true = yaw uniforme por episódio (comportamento original); false = usa rot acima
  lin_vel: [0.0, 0.0, 0.0]  # x,y,z [m/s]
  ang_vel: [0.0, 0.0, 0.0]  # x,y,z [rad/s]
  default_joint_angles: {"Hip_Pitch": -0.2, "Knee_Pitch": 0.4, "Ankle_Pitch": -0.25, "default": 0.} # target angles when action = 0.0

control:
  # Início mais suave: menos binário nas articulações (menos “explosão” / cambalhota por PD forte)
  stiffness: {"Hip": 140., "Knee": 140., "Ankle": 36.} # [N*m/rad]
  damping: {"Hip": 3.5, "Knee": 3.5, "Ankle": 0.75} # [N*m*s/rad]
  action_scale: 0.82 # alvo de posição = default + scale*ação; reduz pico de binário
  decimation: 10
  actuation_delay_steps: 0 # omitir esta chave = atraso aleatório [0, decimation) por env (original)

terrain:
  type: "plane" # "plane" or "trimesh"
  static_friction: 1.0  # [-]
  dynamic_friction: 1.0  # [-]
  restitution: 0.        # [-]
  # trimesh only:
  terrain_length: 10.
  terrain_width: 10.
  border_size: 5.
  num_terrains: 8
  terrain_proportions: [0.0, 0.0, 0.5, 0.5] # terrain types: [plane, slope, random, discrete]
  slope: 0.1
  random_height: 0.1
  discrete_height: 0.02
  horizontal_scale: 0.1
  vertical_scale: 0.005
  slope_threshold: 2.0

commands:
  num_commands: 3 # default: lin_vel_x, lin_vel_y, ang_vel_yaw
  # frac_vel ~100% com terminate_vel baixo: o agente tenta cumprir vx e bate no teto antes de “cair devagar”.
  # Aqui: maior still + menor resolução em x = comandos de marcha lentos; a política não é paga para ir rápido.
  still_proportion: 0.72
  lin_vel_x: [-1.0, 1.0] # usado se curriculum: false
  lin_vel_y: [-1.0, 1.0]
  ang_vel_yaw: [-1, 1]
  resampling_time_s: [4., 8.]
  gait_frequency: [1.0, 1.1]
  curriculum: true
  update_rate: 0.05
  lin_vel_levels: 10
  ang_vel_levels: 10
  # |vx| máx na grelha ≈ nível * resolução → 10*0.032 ≈ 0.32 m/s (antes ~0.8 m/s com 0.08)
  lin_vel_x_resolution: 0.032
  lin_vel_y_resolution: 0.04
  ang_vel_resolution: 0.05
  episode_length_toler: 0.08
  lin_vel_x_toler: 0.5 # [m/s] mais largo para curriculum não bloquear cedo
  lin_vel_y_toler: 0.25
  ang_vel_yaw_toler: 0.3

normalization:
  gravity: 1.0
  lin_vel: 1.0
  ang_vel: 1.0
  dof_pos: 1.0
  dof_vel: 0.1
  filter_weight: 0.1
  push_force: 0.1
  push_torque: 0.5
  clip_actions: 1.

noise: {}

randomization: {}

rewards:
  scales:
    # Sobrevivência domina sobre vx: ambos ~1 por passo no termo bruto; escala ~30× maior em survival
    survival: 1.35
    tracking_lin_vel_x: 0.04
    tracking_lin_vel_y: 0
    # Comando de yaw passa a ter sinal explícito: episódios “still” querem ω≈0 (reduz giro parasita)
    tracking_ang_vel: 0.14
    base_height: -22. # menos conflito com estabilidade; antes -30 puxava tronco alto demais com postura frágil
    orientation: -14. # tronco alinhado com vertical
    torques: -2.8e-4
    torque_tiredness: -1.e-2
    power: -3.e-3
    lin_vel_z: -5.
    ang_vel_xy: -1.25 # roll/pitch fortes = estrelinha
    ang_vel_yaw: -2.35 # giro no eixo do tronco (complementa tracking_ang_vel quando cmd ω≠0)
    dof_vel: -1.e-4
    dof_acc: -1.e-7
    root_acc: -8.e-4
    action_rate: -2.8
    dof_pos_limits: -1.
    dof_vel_limits: -0.
    torque_limits: -0.
    collision: -1.
    feet_slip: -0.1
    feet_vel_z: -0.
    feet_yaw_diff: -1.
    feet_yaw_mean: -1.
    feet_roll: -0.1
    feet_distance: -1.
    feet_swing: 0 # remove incentivo a balanço de pernas (escala 0 = termo omitido no env)
  episode_length_s: 30.
  # Margem um pouco maior que o alvo de altura: muitos resets vinham só por afundar ligeiramente
  terminate_height: 0.43
  # Alto de propósito: só corta explosões; queda normal → terminate_height / contacto / timeout
  terminate_vel: 8500.
  # Tronco no chão = fim (cambalhota costuma pousar Trunk). H1/H2 se tiverem colisão no URDF.
  terminate_contacts_on: ["Trunk", "H1", "H2"]
  penalize_contacts_on: ["Trunk", "H1", "H2", "AL", "AR", "Waist", "Hip", "Shank", "Ankle"]
  only_positive_rewards: false # bootstrap: sinal completo; repor true para fine-tuning se oscilar
  tracking_sigma: 0.18
  base_height_target: 0.635 # mais próximo de postura estável; 0.68 + spin costumava precipitar terminate_height
  soft_dof_pos_limit: 1. # percentage of urdf limits, values above this limit are penalized
  soft_dof_vel_limit: 1.
  soft_torque_limit: 1.
  swing_period: 0.2
  feet_distance_ref: 0.2
